<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<meta name="description" content="Authentication failed. Return to the home page and try connecting your device again."/>

	<title th:text="#{title}">Authentication failed</title>

	<link rel="stylesheet" type="text/css" href="../static/css/failure.css" th:href="@{/css/failure.css}"/>
	<link rel="stylesheet" type="text/css" href="../static/css/core.css" th:href="@{/css/core.css}"/>

	<script>
		function replay() {
			const animation = document.getElementById("successAnimation");

			if (!animation) {
				return;
			}

			animation.classList.remove("animated");
			void animation.offsetWidth;
			animation.classList.add("animated");

			setTimeout(replay, 5000);
		}

		window.addEventListener("load", function () {
			setTimeout(replay, 5000);
		});
	</script>
</head>
<body>
	<main class="container">
		<div class="round-corners-green">
			<svg id="successAnimation" class="animated" xmlns="http://www.w3.org/2000/svg" width="170" height="170" viewBox="0 0 70 70" role="img" aria-label="Authentication failed">
				<path id="successAnimationResult" fill="#0000FF" d="M35,60 C21.1928813,60 10,48.8071187 10,35 C10,21.1928813 21.1928813,10 35,10 C48.8071187,10 60,21.1928813 60,35 C60,48.8071187,48.8071187,60 35,60 Z M23.6332378,33.2260427 L22.3667622,34.7739573 L34.1433655,44.40936 L47.776114,27.6305926 L46.223886,26.3694074 L33.8566345,41.59064 L23.6332378,33.2260427 Z"/>
				<circle id="successAnimationCircle" cx="35" cy="35" r="24" stroke="#FF0000" stroke-width="4" stroke-linecap="round" fill="transparent"/>
				<polyline id="successAnimationCheck" stroke="#FFFFFF" stroke-width="4" points="25 25 45 45 35 35 45 25 25 45" fill="transparent"/>
			</svg>

			<p th:text="#{failure.text.1}">Your authentication has failed:</p>

			<p th:text="${errorText}" th:if="${errorText}">Error</p>
			<p th:utext="#{${errorCode}}" th:if="${errorCode}">Error</p>
		</div>

		<div>
			<button
				type="button"
				class="nav-button"
				th:text="'Back to Home'"
				th:onclick="'window.location.href=\'' + @{/} + '\''">
				Back to Home
			</button>
		</div>
	</main>
</body>
</html>
